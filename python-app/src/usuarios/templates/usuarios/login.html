{% extends "base.html" %}
{% load static %}

{% block title %}Iniciar Sesión — CaliPro{% endblock %}

{% block content %}
<div id="view-login" style="min-height:100vh; display:flex; align-items:center; justify-content:center;">
  <div class="login-card animate-in">
    <div class="login-logo">
      <div class="login-logo-mark">🍋</div>
      <div class="login-brand-name">CaliPro – Packing Exportación</div>
    </div>

    <form method="post" class="login-form">
      {% csrf_token %}
      {% if form.non_field_errors %}
        <div class="alert alert-danger">{{ form.non_field_errors }}</div>
      {% endif %}

      <div class="form-group">
        <label class="form-label" for="{{ form.username.id_for_label }}">Usuario</label>
        <div class="input-with-icon">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
          </span>
          <input type="text"
                 id="{{ form.username.id_for_label }}"
                 name="{{ form.username.html_name }}"
                 class="form-input"
                 autocomplete="username"
                 autofocus
                 {% if form.username.value %}value="{{ form.username.value }}"{% endif %}>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="{{ form.password.id_for_label }}">Contraseña</label>
        <div class="input-with-icon">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password"
                 id="{{ form.password.id_for_label }}"
                 name="{{ form.password.html_name }}"
                 class="form-input"
                 autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full btn-lg">Acceder</button>
    </form>
  </div>
</div>
{% endblock %}
